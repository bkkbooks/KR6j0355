body:
  text: 失譯人名附東晉録如是我聞一時世尊安住菩提樹下與大弟子舍利弗目犍連等而為上首復有無量諸大菩薩摩訶薩其名曰金剛幢菩薩金剛藏菩薩彌勒菩薩賢劫大士亦為上首爾時金剛密迹菩薩承佛威神發如是言惟願世尊分別演説善門陀羅尼當為世間作大照明除滅怨害惡友毒心若天龍夜叉羅剎鳩槃茶人及非人諸大鬼神噉人精氣左道蠱毒怨家詐諂伺人短者如是無有救護之處如來大慈當為除滅怖畏等事安止衆生於清淨地行住坐臥乃至夢中常當守護不令憂惱有是利故我今勸請大悲調御當為説之亦當救護大乘人心令其堅固功德智慧不退之行悉除怨害命不中夭爾時金剛密迹菩薩勸請佛已瞻仰尊顏心有顧念爾時世尊大悲導師發大雷音聲遍世界讚歎密迹菩薩善哉善哉善男子汝今真是菩薩之人能為衆生得安樂故發如是問我今亦為一切衆生當説此善門陀羅尼爾時密迹喜未曾有惟願矜愍善分別之於時世尊告大士言諦聽諦聽善思念之吾當為汝演暢其義密迹言唯然受教即説呪曰多絰他漚究牟究摩比尼摩陀尼槃羅遮吟那休休休利跋多莎訶爾時世尊説此灌頂陀羅尼已復更宣説陀羅尼句多絰他跋闍跋闍跋闍達梨跋闍波汦跋闍毗汦跋闍大地遮迦羅跋時遮迦羅達梨達梨達梨跋梨牟梨遮隸休休利波伽頻毗梨梨梨尼留留志遮梨周梨牟梨曼荼梨此持名善能除滅一切過惡亦除一切四百諸疾復能令人命不中夭多絰他摩荼尼伽伽羅尼牟荼尼僧波羅牟荼尼那奢尼那奢尼那奢尼婆陀尼蚩真兜蚩真兜毗梨摩梨呵多尼跋梨婆梨婆地毗地毗梨留娑梨奢羅寧羅和寧羅和那荼蛇跋羅摩遮梨那伊陀羅婆汦地地羅蛇尼那無摩醯奢婆羅梨師婆摩呼尼波波閻摩呼尼迦羅婆地呼施婆地蘇摩婆汦蘇摩婆羅鞞莎呵多絰他呵羅呵羅希羅伊大摩婆遮婆伽婆莎呵迦絰多阿䨲那阿梨闍婆尼迦伽大尼阿多荼呵尼末伽毗盧呵尼休娑婆汦呼娑婆汦希利希利蛇他時蛇他祁尼蛇他波蘭遮蛇他婆焰蛇他婆嵐蛇他希利耽莎訶爾時世尊説此金剛祕密善門陀羅尼欲令人天獲大饒益永離苦難常處安樂如是持者過去諸佛已説教化未來今佛亦共宣説佛告金剛密迹菩薩善男子大悲愍念一切衆生故我今説之爾時世尊説此持時於其肉髻無見頂上出大人相光照明赫奕遍照十方無量世界時諸佛土亦復自然涌出光明艷色希有殄滅一切所有幽冥時十方人天異類咸覩是相生希有心皆作此念有何因緣而現是相光遍世界爾時諸佛告衆會曰善男子諦聽有佛世界名曰娑婆佛號釋迦牟尼如來大悲憐愍一切衆生令安樂故説是善門陀羅尼是時衆會聞其佛説釋迦威德力皆同發聲讚歎釋迦希有善哉能於娑婆生大悲心為安天人故説是持此持希有乃是無相真實智慧之所宣説我等願樂勤修行之得是持已亦當如是出生大悲教化衆生諸佛讚言善哉善哉善男子欲行此善門陀羅尼者常於晨朝嚙木澡漱燒香散華攝心讀誦不令馳騁於諸境界所以者何此持乃是三世諸佛持説教化汝等應當憶念如説修行五辛酒肉所不經口梵行居心除捨緣務於寂靜處然後讀誦能令行者得大功德無邊智慧欲行善門陀羅尼者當發誓願乃至成佛莫令廢忘恆於晨朝讀之一遍若求現願七日七夜勤而行之無不果遂惟除過去有重罪者於今少時不能令盡其餘諸業無不除滅修一切諸善乃至涅槃悉皆能得具足二十功德之利何等二十所謂長命盡壽名稱資生色力無病勇猛精進諸佛護念其心調柔諸天護助願行善行思甚深義精勤不怠光顏怡悅相好具足辨才無畏增滿善根是故世尊説此金剛祕密深奧善門陀羅尼汝應憶念至誠修行所以者何如此持者於諸持中最為吉祥爾時金剛密迹菩薩白佛言世尊我今愍念擁護一切衆生令得安樂除諸哀惱不令諸惡得其便也多絰他尼企尼企志志志志婆婆婆婆留留留留時時時時迦羅迦羅迦羅迦羅希利希利希利希利破破破破摩摩摩摩呵那呵那呵那呵那大呵大呵大呵大呵婆䨲阿伽耶希帝利莎呵爾時世尊讚金剛密迹言善哉善哉大士乃能説此大威神呪擁護一切皆得安隱益其精氣不令諸惡人非人奪其精氣者得其便爾時大梵天王及諸眷屬即從座起偏袒右肩合掌白佛言世尊我今亦欲隨喜佐助受持讀誦善門陀羅尼者增長衆生壽命色力除其衰患使無伺求得其便者惟願世尊加哀護助得如所願多絰他希利彌利汦利莎呵跋嵐阿摩富梨莎呵跋嵐摩卑婆羅羯捭弗波僧多梨莎呵若有善男子善女人欲行此持者常於晨朝清淨澡漱已至心讀誦爾時釋提桓因即從座起偏袒合掌白佛言世尊我今亦欲擁護一切衆生不令諸惡人非人奪精氣得其便也即説陀羅尼句多絰他毗尼婆羅尼婆大羅摩陵持挃致置瞿梨乾陀梨婆羅摩羅汦呵那摩耽多羅尼大羅摩利尼遮迦羅婆翅睒婆梨睒婆梨莎呵行呪此法常於晨朝清淨已至心讀誦爾時四天王即從座起偏袒右肩合掌向佛而作是言我等亦欲擁護一切衆生不令諸惡人非人伺其惡者得其便也多絰他弗羆修弗羆頭摩波梨呵離阿利夜波羅汦羶汦涅目汦末伽梨多兜汦兜莎呵此呪常於晨朝清淨已至心讀誦爾時釋迦牟尼佛即舉右手讚歎梵釋四天王言善哉善哉汝等善能宣説諸佛所持陀羅尼句爾時世尊告金剛密迹菩薩善男子若有得聞善門陀羅尼心無疑惑能於晨朝清淨三業已至心讀誦所得功德不可稱計
